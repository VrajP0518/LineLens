name: Tauri Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build LineLens Sports for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python data dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Refresh current MLB predictions before packaging
        run: npm run refresh:mlb:predict

      - name: Verify release bundle and data contracts
        run: npm run verify:release

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Verify packaged Tauri runtime resources
        run: npm run check:tauri:resources

      - name: Capture packaged runtime verification
        shell: pwsh
        run: |
          python scripts/verify_tauri_resources.py | Tee-Object tauri-resource-verification.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Generate installer checksums
        shell: pwsh
        run: |
          $files = Get-ChildItem src-tauri/target/release/bundle -Recurse -File | Where-Object { $_.Extension -in '.exe', '.msi' }
          if (-not $files) { throw 'No Windows installers were generated.' }
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $file.FullName).Hash
            "$hash  $($file.Name)"
          }
          $lines | Set-Content -Encoding utf8 release-checksums.txt

      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: LineLens-Sports-Windows-v5.4.0
          path: |
            src-tauri/target/release/bundle/**
            tauri-resource-verification.txt
            release-checksums.txt
          if-no-files-found: error

      - name: Publish GitHub Release for version tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: LineLens Sports ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            release-checksums.txt
