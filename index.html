<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LineLens Sports</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js" defer></script>
    <script src="data/app_metadata.js" defer></script>
    <script src="data/team_metadata.js" defer></script>
    <script src="data/reports/model_report.js" defer></script>
    <script src="data/reports/mlb_model_comparison.js" defer></script>
    <script src="data/reports/mlb_moltres_model_card.js" defer></script>
    <script src="data/reports/mlb_feature_summary.js" defer></script>
    <script src="data/models/model_registry.js" defer></script>
    <script src="data/tracking/model_record.js" defer></script>
    <script src="data/tracking/model_predictions_log.js" defer></script>
    <script src="data/bootstrap_status.js" defer></script>
    <script src="data/startup_status.js" defer></script>
    <script src="data/refresh_status.js" defer></script>
    <script src="data/predictions/nfl_predictions.js" defer></script>
    <script src="data/predictions.js" defer></script>
    <script src="data/predictions/mlb_predictions.js" defer></script>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <span class="brand__mark">LL</span>
                <div>
                    <strong>LineLens Sports</strong>
                    <small id="sidebar-version">v0.2.0</small>
                </div>
            </div>
            <nav class="nav" aria-label="Primary navigation">
                <button class="nav__item is-active" data-view="home">Home</button>
                <button class="nav__item" data-view="nfl">NFL</button>
                <button class="nav__item" data-view="mlb">MLB</button>
                <button class="nav__item" data-view="models">Models</button>
                <button class="nav__item" data-view="reports">Reports</button>
                <button class="nav__item" data-view="record">Record</button>
                <button class="nav__item" data-view="teams">Teams</button>
                <button class="nav__item" data-view="tracking">Tracking</button>
                <button class="nav__item" data-view="settings">Settings</button>
            </nav>
            <div class="sidebar__note">
                <span class="status-dot"></span>
                CI-first desktop builds through GitHub Actions.
            </div>
            <div class="ll-sidebar-engine">
                <strong>AI Edge Engine</strong>
                <span>Models scanning loaded board signals.</span>
                <i aria-hidden="true"></i>
            </div>
        </aside>

        <div class="workspace">
            <header class="topbar">
                <div>
                    <p class="eyebrow" id="view-kicker">sports prediction command center</p>
                    <h1 id="view-title">LineLens Sports</h1>
                </div>
                <div class="topbar__meta">
                    <button id="refresh-btn" class="btn btn--primary">Reload exports</button>
                </div>
            </header>

            <p class="data-status" id="data-status">Loading prediction exports...</p>

            <main>
                <section class="view is-active" id="view-home"></section>
                <section class="view" id="view-nfl"></section>
                <section class="view" id="view-mlb"></section>
                <section class="view" id="view-models"></section>
                <section class="view" id="view-reports"></section>
                <section class="view" id="view-record"></section>
                <section class="view" id="view-teams"></section>
                <section class="view" id="view-tracking"></section>
                <section class="view" id="view-settings"></section>
            </main>
        </div>
    </div>

    <div id="global-ticker" class="global-ticker-slot" aria-live="polite"></div>
    <div id="gamecast-root"></div>
    <div id="live-notification-root" class="live-notification-root" aria-live="polite"></div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="app.js" defer></script>
</body>
</html>
